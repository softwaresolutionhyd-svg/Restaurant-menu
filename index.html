<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a222c;
      --accent: #c9a227;
      --text: #e8e4dc;
      --muted: #9aa3ad;
    }
    body {
      font-family: "Source Sans 3", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #243044 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }
    h1, h2, h3 { font-family: "Playfair Display", Georgia, serif; }
    .brand {
      letter-spacing: 0.04em;
      color: var(--accent);
    }
    .menu-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      backdrop-filter: blur(6px);
    }
    .item-row {
      border-bottom: 1px dashed rgba(255,255,255,0.1);
    }
    .item-row:last-child { border-bottom: 0; }
    .price-pill {
      background: rgba(201, 162, 39, 0.15);
      color: var(--accent);
      font-weight: 600;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      white-space: nowrap;
    }
    .date-badge {
      border: 1px solid rgba(201, 162, 39, 0.35);
      color: var(--accent);
    }
    .spinner-wrap { min-height: 40vh; }
  </style>
</head>
<body>
  <div class="container py-4 py-md-5">
    <header class="text-center mb-4 mb-md-5">
      <p class="text-uppercase small text-secondary mb-1">Digital menu</p>
      <h1 class="display-5 fw-bold brand mb-2" id="restaurantName">Loading…</h1>
      <p class="lead text-secondary mb-3" id="tagline"></p>
      <span class="badge rounded-pill px-3 py-2 date-badge" id="menuDate"></span>
    </header>

    <div id="loading" class="spinner-wrap d-flex align-items-center justify-content-center">
      <div class="spinner-border text-warning" role="status"><span class="visually-hidden">Loading</span></div>
    </div>

    <div id="menuRoot" class="row g-4 d-none"></div>

    <div id="errorBox" class="alert alert-warning d-none mt-4" role="alert"></div>

    <footer class="text-center text-secondary small mt-5 pt-3 border-top border-secondary border-opacity-25">
      Menu updates automatically when the restaurant publishes changes — same link every time.
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      const cacheBust = "t=" + Date.now();
      const url = "menu.json?" + cacheBust;

      function fmtPrice(n, currency) {
        const num = Number(n);
        if (Number.isNaN(num)) return "";
        try {
          return new Intl.NumberFormat(undefined, { style: "currency", currency: currency || "PKR", maximumFractionDigits: 0 }).format(num);
        } catch {
          return (currency || "") + " " + num;
        }
      }

      function render(data) {
        document.getElementById("restaurantName").textContent = data.restaurantName || "Menu";
        document.getElementById("tagline").textContent = data.tagline || "";
        const md = data.menuDate || (data.updatedAt || "").slice(0, 10) || "";
        document.getElementById("menuDate").textContent = md ? "Menu for " + md : "";

        const root = document.getElementById("menuRoot");
        root.innerHTML = "";
        const cats = Array.isArray(data.categories) ? data.categories : [];

        cats.forEach(function (cat) {
          const col = document.createElement("div");
          col.className = "col-12 col-lg-6";
          const items = Array.isArray(cat.items) ? cat.items : [];
          const itemsHtml = items.map(function (it) {
            const desc = (it.description || "").trim();
            return (
              '<div class="item-row py-3 d-flex justify-content-between align-items-start gap-3">' +
              '<div><div class="fw-semibold">' + escapeHtml(it.name || "") + "</div>" +
              (desc ? '<div class="small text-secondary mt-1">' + escapeHtml(desc) + "</div>" : "") +
              "</div>" +
              '<div class="price-pill">' + fmtPrice(it.price, data.currency) + "</div></div>"
            );
          }).join("");

          col.innerHTML =
            '<div class="menu-card p-4 h-100">' +
            '<h2 class="h4 mb-3">' + escapeHtml(cat.name || "Category") + "</h2>" +
            (itemsHtml || '<p class="text-secondary mb-0">No items yet.</p>') +
            "</div>";
          root.appendChild(col);
        });

        if (!cats.length) {
          root.innerHTML = '<div class="col-12"><div class="menu-card p-4 text-center text-secondary">No categories in menu.json yet.</div></div>';
        }

        document.getElementById("loading").classList.add("d-none");
        root.classList.remove("d-none");
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function showError(msg) {
        document.getElementById("loading").classList.add("d-none");
        const e = document.getElementById("errorBox");
        e.textContent = msg;
        e.classList.remove("d-none");
      }

      fetch(url, { cache: "no-store" })
        .then(function (r) {
          if (!r.ok) throw new Error("Could not load menu.json (" + r.status + ").");
          return r.json();
        })
        .then(render)
        .catch(function (err) {
          showError(err.message || "Failed to load menu.");
        });
    })();
  </script>
</body>
</html>
